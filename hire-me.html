<script id="hide-make-work">
  const hideMakeWork = () => {
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
    let node;
    while (node = walker.nextNode()) {
        if (node.nodeValue && node.nodeValue.includes('Make the')) {
            // Find the parent element that holds the text
            let parent = node.parentElement;
            if (parent && parent.tagName !== 'SCRIPT') {
                // Find the closest section or a large wrapper
                const section = parent.closest('section');
                if (section) {
                    section.style.display = 'none';
                } else {
                    // Fallback to hiding the direct parent container if no section tag
                    parent.style.display = 'none';
                }
            }
        }
    }
  };
  setInterval(hideMakeWork, 100);
</script>

  if (form) {

      e.preventDefault();

      fetch(form.action, {
        method: form.method,
        body: new FormData(form),

    });
